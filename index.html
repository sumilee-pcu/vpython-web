<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>vpython-web — Web VPython powered by real CPython</title>

<!-- CodeMirror (에디터) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>

<!-- Pyodide (브라우저용 CPython) -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>

<!-- three.js (WebGL 렌더러) -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; font-family: "Segoe UI", sans-serif; background: #1a1a1a; color: #eee; }
  #app { display: flex; flex-direction: column; height: 100%; }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 16px; background: #222; border-bottom: 1px solid #333;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .sub { font-size: 12px; color: #888; }
  #run {
    margin-left: auto; padding: 6px 20px; font-size: 14px; font-weight: 600;
    background: #2e7d32; color: #fff; border: none; border-radius: 4px; cursor: pointer;
  }
  #run:disabled { background: #444; cursor: wait; }
  #run:hover:not(:disabled) { background: #388e3c; }
  #status { font-size: 12px; color: #aaa; }
  #main { display: flex; flex: 1; min-height: 0; }
  #left { display: flex; flex-direction: column; width: 45%; min-width: 320px; border-right: 1px solid #333; }
  .CodeMirror { flex: 1; height: auto; font-size: 14px; }
  #output {
    height: 120px; overflow-y: auto; padding: 8px 12px; margin: 0;
    background: #111; border-top: 1px solid #333;
    font-family: Consolas, monospace; font-size: 13px; white-space: pre-wrap; color: #9ccc65;
  }
  #canvas-host { flex: 1; min-width: 0; position: relative; }
  #canvas-host canvas { display: block; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>vpython-web</h1>
    <span class="sub">Web VPython powered by real CPython (Pyodide + three.js)</span>
    <span id="status">로딩 중...</span>
    <button id="run" disabled>▶ Run</button>
  </header>
  <div id="main">
    <div id="left">
      <textarea id="code"></textarea>
      <pre id="output"></pre>
    </div>
    <div id="canvas-host"></div>
  </div>
</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
